# Local full-stack environment: the ClauseIQ app plus its backing services.
#
#   docker compose up --build
#
# - app       FastAPI (health endpoints in M1), connects to ChromaDB over HTTP
# - chromadb  vector store (persistent volume)
# - postgres  database for Langfuse
# - langfuse  self-hosted observability
#
# After the stack is up, bootstrap the law corpus into the ChromaDB service:
#   docker compose exec app python scripts/ingest_laws.py

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CLAUSEIQ_CHROMA_MODE: http
      CLAUSEIQ_CHROMA_HOST: chromadb
      CLAUSEIQ_CHROMA_PORT: "8000"
      CLAUSEIQ_LANGFUSE_HOST: http://langfuse:3000
      CLAUSEIQ_LOG_JSON: "true"
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  chromadb:
    image: chromadb/chroma:0.5.20
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat').status==200 else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-me
      SALT: dev-salt-change-me
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"

volumes:
  chroma_data:
  postgres_data:
