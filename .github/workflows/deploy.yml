name: Deploy

# Deploy the backend to Render after CI succeeds on main. Render builds the image
# from the repo Dockerfile; this triggers that deploy via a deploy-hook secret.
# (Vercel deploys the frontend automatically from its own Git integration.)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy backend to Render
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy triggered."
