name: Deploy

# Deploy the backend to Google Cloud Run after CI succeeds on main.
# `gcloud run deploy --source` uses Cloud Build to build the Dockerfile, push to
# Artifact Registry, and deploy. The frontend deploys via Vercel's own Git
# integration. Gemini runs on Vertex AI (GCP credits) with automatic fallback to
# the AI Studio key (mounted from Secret Manager). Setup: docs/DEPLOY.md.
#
# Requires repo variables GCP_PROJECT, GCP_REGION and secrets GCP_WIF_PROVIDER,
# GCP_DEPLOY_SA. The job no-ops if GCP_PROJECT is unset.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write # for keyless Workload Identity Federation

jobs:
  deploy-backend:
    name: Deploy backend to Cloud Run
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.GCP_PROJECT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy clauseiq-api \
            --source . \
            --project "${{ vars.GCP_PROJECT }}" \
            --region "${{ vars.GCP_REGION }}" \
            --memory 2Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 8 \
            --max-instances 3 \
            --allow-unauthenticated \
            --set-env-vars "^@@^CLAUSEIQ_ENVIRONMENT=prod@@CLAUSEIQ_GEMINI_BACKEND=vertex@@CLAUSEIQ_GCP_PROJECT=${{ vars.GCP_PROJECT }}@@CLAUSEIQ_GCP_LOCATION=${{ vars.GCP_REGION }}@@CLAUSEIQ_CORS_ALLOWED_ORIGINS=[\"https://clauseiq.vercel.app\"]" \
            --set-secrets "CLAUSEIQ_GEMINI_API_KEY=clauseiq-gemini-key:latest"
