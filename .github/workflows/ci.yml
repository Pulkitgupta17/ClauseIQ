name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (incl. eval group)
        run: uv sync --frozen --all-groups

      # Step 1 — lint + format
      - name: Lint (ruff)
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts

      # Step 2 — type check
      - name: Type check (mypy --strict)
        run: uv run mypy --strict src

      # Step 3 — unit tests
      - name: Unit tests
        run: uv run pytest tests/unit -q

      # Step 4 — integration tests (LLMs are mocked in these)
      - name: Integration tests
        run: uv run pytest tests/integration -q

      # Steps 5 & 6 — evaluation suite + EVAL GATE.
      # The evaluation test asserts Faithfulness >= 0.85 and Context Recall >= 0.80
      # (settings.*_threshold), so a regression fails the job. It runs only when a
      # GEMINI_API_KEY secret is configured; otherwise the deterministic metrics run
      # and the live LLM-judged gate skips cleanly.
      - name: Evaluation suite + eval gate
        env:
          CLAUSEIQ_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_HUB_DISABLE_XET: "1"
        run: uv run pytest tests/evaluation -q

  # Step 7 — build and push the backend image to GHCR (main branch only).
  docker:
    name: Build & push image (GHCR)
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
