name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests scripts
      - name: ruff format --check
        run: uv run ruff format --check src tests scripts

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # All groups so deepeval is present (evaluation modules type-check against it).
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: mypy --strict src
        run: uv run mypy --strict src

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: pytest (unit + integration)
        run: uv run pytest --cov=src/clauseiq --cov-report=term-missing

  eval-gate:
    name: Evaluation gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (incl. eval group)
        run: uv sync --frozen --all-groups
      # The deterministic CitationAccuracyMetric + dataset validation always run.
      # The LLM-judged metrics run only when a GEMINI_API_KEY secret is configured;
      # otherwise the live evaluation skips cleanly.
      - name: Evaluation suite
        env:
          CLAUSEIQ_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_HUB_DISABLE_XET: "1"
        run: uv run pytest tests/evaluation/ -v
